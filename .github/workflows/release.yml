name: Build & publish image

# Build and publish the Docker image to Docker Hub.
#
# Triggers:
#   - push to `main`     → publishes `:latest` (+ a `sha-<commit>` tag). This is
#     the auto-deploy path: every merge to main refreshes the image the
#     Portainer/Swarm stack pulls.
#   - push of a `v*` tag → publishes the semver tags (`1.2.3`, `1.2`).
#   - manual dispatch.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (a Docker Hub access token).
#
# This only keeps `:latest` up to date; it does NOT restart the running
# container. After a merge, click "Update/Pull" on the stack in Portainer and
# the corrected image is already there.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  image:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ia-notices
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
