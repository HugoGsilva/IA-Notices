# =============================================================================
# IA-Notices — Docker Swarm / Portainer stack
#
# IA-Notices is a headless worker: an internal scheduler runs the pipeline and
# delivery to Discord is OUTBOUND. Nothing reaches it from the internet, so this
# stack deliberately has NO Traefik route and is NOT on the public network.
#
# Prerequisites:
#   1. Publish the image to a registry (Swarm does not build):
#        docker build -t hugogsilva/ia-notices:latest .
#        docker push hugogsilva/ia-notices:latest
#      (cross-arch: docker buildx build --platform linux/amd64 -t ... --push .)
#      The release workflow (.github/workflows/release.yml) does this on tags.
#   2. In Portainer → Stacks → Add stack, paste this file and set the
#      environment variables below (at least DISCORD_WEBHOOK_URL).
#
# Forcing a new image on Swarm:
#   Swarm pins :latest to a digest and a plain "redeploy" will NOT re-pull it
#   (the service spec did not change, so the old container keeps running). To
#   deploy a fresh build, set IMAGE_TAG to that build's immutable tag — the
#   release workflow publishes `sha-<short-commit>` for every push to main
#   (e.g. IMAGE_TAG=sha-17cfcf0). Changing IMAGE_TAG changes the spec, so Swarm
#   recreates the task and pulls the new image. Leave it unset to track :latest.
# =============================================================================

version: '3.8'

services:
  ia-notices:
    image: 'hugogsilva/ia-notices:${IMAGE_TAG:-latest}'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /app/data/ia-notices.sqlite
      LOG_LEVEL: '${LOG_LEVEL:-info}'
      # --- Sources (no API key) ---
      # Fixed ON: the high-signal dev/AI sources (Hacker News, Hugging Face
      # papers, official AI blogs via RSS). These are hardcoded (not
      # env-overridable) so the deployment is explicit.
      HACKERNEWS_ENABLED: 'true'
      HUGGINGFACE_ENABLED: 'true'
      RSS_ENABLED: 'true'
      # Reddit is OFF: it blocks datacenter/VPS IPs on the public .json endpoint
      # (HTTP 403) without OAuth. Re-enable only with OAuth credentials wired in.
      REDDIT_ENABLED: 'false'
      # GDELT is OFF: mainstream news, low signal for dev/AI, rate-limits hard.
      GDELT_ENABLED: 'false'
      # Optional keyed providers (stay off unless you provide a key):
      NEWSAPI_ENABLED: '${NEWSAPI_ENABLED:-false}'
      NEWSAPI_KEY: '${NEWSAPI_KEY:-}'
      GUARDIAN_ENABLED: '${GUARDIAN_ENABLED:-false}'
      GUARDIAN_KEY: '${GUARDIAN_KEY:-}'
      # --- Discord delivery ---
      DISCORD_ENABLED: '${DISCORD_ENABLED:-true}'
      DISCORD_WEBHOOK_URL: '${DISCORD_WEBHOOK_URL:?DISCORD_WEBHOOK_URL is required}'
      # --- Scheduler ---
      SCHEDULE_ENABLED: '${SCHEDULE_ENABLED:-true}'
      SCHEDULE_CRON: '${SCHEDULE_CRON:-0 * * * *}'
      # --- Admin (optional: only for the manual run endpoint) ---
      ADMIN_TOKEN: '${ADMIN_TOKEN:-}'
      # --- Curation tuning ---
      # Sensible defaults (dev/AI keywords, MIN_SCORE=2, LOOKBACK=48h,
      # HN MIN_POINTS=30, Reddit MIN_UPVOTES=25, HTTP timeout/retries) are baked
      # into the image. Uncomment to override without rebuilding:
      # NEWS_KEYWORDS: '${NEWS_KEYWORDS:-LLM,GPT-5,AI agent,open source model,fine-tuning,coding assistant,Hugging Face,language model}'
      # NEWS_MIN_SCORE: '${NEWS_MIN_SCORE:-2}'
      # NEWS_LOOKBACK_HOURS: '${NEWS_LOOKBACK_HOURS:-48}'
      # Quality gates — raise for fewer/stronger items, lower for more volume:
      # HACKERNEWS_MIN_POINTS: '${HACKERNEWS_MIN_POINTS:-30}'
      # REDDIT_MIN_UPVOTES: '${REDDIT_MIN_UPVOTES:-25}'
      # Source tuning (subreddits, Reddit window, blog feeds):
      # REDDIT_SUBREDDITS: '${REDDIT_SUBREDDITS:-LocalLLaMA,MachineLearning,ChatGPTCoding,ClaudeAI,OpenAI,artificial}'
      # REDDIT_LISTING: '${REDDIT_LISTING:-day}'
      # RSS_FEEDS: '${RSS_FEEDS:-https://huggingface.co/blog/feed.xml,https://openai.com/news/rss.xml,https://deepmind.google/blog/rss.xml,https://bair.berkeley.edu/blog/feed.xml,https://machinelearning.apple.com/rss.xml}'
      # HTTP_TIMEOUT_MS: '${HTTP_TIMEOUT_MS:-20000}'
      # HTTP_RETRIES: '${HTTP_RETRIES:-3}'
    volumes:
      - ia-notices-data:/app/data
    networks:
      - internal
    deploy:
      # IMPORTANT: SQLite is single-writer — NEVER scale replicas above 1, and
      # do not use a start-first rollout (it would briefly run two writers).
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

    # -------------------------------------------------------------------------
    # OPTIONAL — expose POST /internal/run through Traefik for remote manual
    # triggering (protected by ADMIN_TOKEN). Not needed for automatic operation.
    # To enable: also add `network_swarm_public` to the networks list above and
    # declare it under the top-level `networks:` as external, then move the
    # labels below into the `deploy:` block.
    #
    #      labels:
    #        - traefik.enable=true
    #        - traefik.http.routers.ia-notices.rule=Host(`ia-notices.hugogsilva.dev`) && PathPrefix(`/internal/run`)
    #        - traefik.http.routers.ia-notices.entrypoints=websecure
    #        - traefik.http.routers.ia-notices.tls.certresolver=letsencryptresolver
    #        - traefik.http.services.ia-notices.loadbalancer.server.port=3000
    # -------------------------------------------------------------------------

networks:
  internal:
    driver: overlay
  # network_swarm_public:   # uncomment only if exposing via Traefik (see above)
  #   external: true

volumes:
  ia-notices-data:
